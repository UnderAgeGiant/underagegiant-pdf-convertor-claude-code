apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-convertor-api
  namespace: pdf-convertor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pdf-convertor-api
  template:
    metadata:
      labels:
        app: pdf-convertor-api
    spec:
      containers:
        - name: api
          # Replace with your registry image, e.g. ghcr.io/yourorg/pdf-convertor:latest
          image: pdf-convertor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: pdf-convertor-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: pdf-convertor-api
  namespace: pdf-convertor
spec:
  selector:
    app: pdf-convertor-api
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdf-convertor-ingress
  namespace: pdf-convertor
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: pdf-convertor.example.com  # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pdf-convertor-api
                port:
                  number: 80
